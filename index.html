<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兒科藥物劑量測驗</title>
    <style>
        :root { --primary: #0284c7; --success: #10b981; --warning: #f59e0b; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: system-ui; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: var(--text); padding: 20px 0; }
        .card { background: white; padding: 2rem; border-radius: 1rem; width: 90%; max-width: 750px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
        
        .form-group { text-align: left; margin-bottom: 1.2rem; }
        .form-group > label { display: block; margin-bottom: 0.5rem; font-weight: bold; font-size: 0.95rem; }
        input[type="text"], input[type="number"], select { width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #cbd5e1; border-radius: 0.5rem; font-size: 1rem; }
        .other-input { margin-top: 8px; background-color: #f8fafc; }
        
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 8px; }
        .checkbox-group label { font-weight: normal; font-size: 1rem; display: flex; align-items: center; cursor: pointer; margin-bottom: 0; }
        .checkbox-group input[type="checkbox"] { margin-right: 8px; width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary); }

        .btn { background: var(--primary); color: white; border: none; padding: 14px 24px; border-radius: 0.5rem; cursor: pointer; font-size: 1.1rem; width: 100%; margin-top: 25px; font-weight: bold; transition: 0.2s; }
        .btn:hover { background: #0369a1; }
        .btn-success { background: var(--success); }
        .btn-success:hover { background: #059669; }
        
        .step-indicator { font-size: 0.9rem; color: #64748b; font-weight: bold; letter-spacing: 1px; margin-bottom: 1rem; text-transform: uppercase; }
        .alert-box { background: #fffbeb; color: #b45309; padding: 12px; border-radius: 8px; border: 1px solid #fde68a; margin-bottom: 20px; font-weight: bold; }
        .tool-box { background: #f0fdf4; border: 2px dashed var(--success); padding: 20px; border-radius: 12px; margin: 20px 0; }

        .g-text-box { background: #e0f2fe; color: #0369a1; padding: 15px; border-radius: 8px; font-size: 1.05rem; text-align: left; font-weight: bold; margin-bottom: 20px; border-left: 5px solid var(--primary); }
        .question-block { text-align: left; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #e2e8f0; }
        .question-block h4 { margin: 0 0 12px 0; color: #1e293b; line-height: 1.5; font-size: 1.1rem; }
        .radio-option { display: block; margin-bottom: 10px; cursor: pointer; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; transition: 0.2s; }
        .radio-option:hover { background: #f8fafc; border-color: #cbd5e1; }
        .radio-option input[type="radio"] { margin-right: 10px; accent-color: var(--primary); transform: scale(1.2); }

        .summary-stats { display: flex; justify-content: space-around; margin: 20px 0; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .stat-box h4 { margin: 0 0 5px 0; color: #64748b; font-size: 0.95rem;}
        .stat-box span { font-size: 1.3rem; font-weight: bold; color: var(--primary); }
        .result-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.95rem; }
        .result-table th, .result-table td { border: 1px solid #cbd5e1; padding: 10px; text-align: center; }
        .result-table th { background-color: #f1f5f9; font-weight: bold; color: #334155; }
        .correct { color: var(--success); font-weight: bold; }
        .wrong { color: #ef4444; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div id="login-screen">
        <div class="step-indicator">Step 1 / 4：基本資料</div>
        <h2 id="quiz-title">測驗載入中...</h2>
        <div id="loading" style="color: var(--primary); font-weight: bold;">正在連線至雲端資料庫...</div>
        
        <div id="login-form" class="hidden">
            <div class="alert-box">💡 本次測驗分為前測與後測，請模擬您平常的工作場域進行前測！</div>
            
            <div class="form-group"><label>姓名 / 暱稱：</label><input type="text" id="u-name" placeholder="請輸入姓名或暱稱"></div>
            
            <!-- 職業改為編號選單 -->
            <div class="form-group">
                <label>職業：</label>
                <select id="u-job" onchange="toggleSelectOther('u-job', 'u-job-other')">
                    <option value="">請選擇...</option>
                    <option value="1">醫師</option>
                    <option value="2">藥師</option>
                    <option value="3">護理師</option>
                    <option value="4">其他</option>
                </select>
                <input type="text" id="u-job-other" class="hidden other-input" placeholder="請註明您的職業">
            </div>

            <div class="form-group"><label>執業多久 (年)：</label><input type="number" id="u-years" placeholder="例如：3" min="0"></div>
            
            <div class="form-group">
                <label>目前執業場所：</label>
                <select id="u-workplace" onchange="toggleSelectOther('u-workplace', 'u-workplace-other')">
                    <option value="">請選擇...</option>
                    <option value="1">醫院</option>
                    <option value="2">診所</option>
                    <option value="3">藥局</option>
                    <option value="4">其他</option>
                </select>
                <input type="text" id="u-workplace-other" class="hidden other-input" placeholder="請註明您的執業場所">
            </div>

            <!-- 新增裝置選單 -->
            <div class="form-group">
                <label>使用裝置：</label>
                <select id="u-device">
                    <option value="">請選擇...</option>
                    <option value="1">手機</option>
                    <option value="2">平板</option>
                    <option value="3">電腦</option>
                    <option value="4">其他</option>
                </select>
            </div>

            <div class="form-group">
                <label>遇到不確定的劑量，最常參考的資料 (可複選)：</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="u-ref" value="Uptodate"> Uptodate</label>
                    <label><input type="checkbox" name="u-ref" value="Micromedex"> Micromedex</label>
                    <label><input type="checkbox" name="u-ref" value="仿單"> 仿單</label>
                    <label><input type="checkbox" name="u-ref" value="乖乖手冊"> 乖乖手冊</label>
                    <label><input type="checkbox" name="u-ref" value="其他" id="cb-other-ref" onchange="toggleCheckboxOther('cb-other-ref', 'u-ref-other')"> 其他</label>
                </div>
                <input type="text" id="u-ref-other" class="hidden other-input" placeholder="請註明您參考的資料">
            </div>
            <button class="btn" onclick="startTestPhase('前測')">開始前測</button>
        </div>
    </div>

    <!-- 測驗畫面 -->
    <div id="quiz-screen" class="hidden">
        <div class="step-indicator" id="progress">測驗進度</div>
        <div class="hidden" style="display: none; font-size: 0.9rem; color: #ef4444; margin-bottom: 1rem; font-weight: bold;">本題組計時中: <span id="current-timer">0.0</span> 秒</div>
        <div id="group-container"></div>
    </div>

    <!-- 中場派發工具 -->
    <div id="tool-screen" class="hidden">
        <div class="step-indicator">Step 3 / 4：工具輔助</div>
        <h2 style="color: var(--primary);">前測完成！</h2>
        <div class="tool-box">
            <h3 style="margin-top: 0; color: var(--success);">兒科藥品劑量計算器</h3>
            <p style="font-size: 0.95rem;">接下來請使用此計算器來作答！</p>
            <a href="https://yunkkstudy.github.io/SmartPaeds/" target="_blank" class="btn btn-success" style="text-decoration: none; display: inline-block; width: auto; padding: 12px 30px;">點此開啟計算器</a>
        </div>
        <button class="btn" onclick="startTestPhase('後測')" style="margin-top: 10px;">我已開啟計算器，開始後測</button>
    </div>

    <!-- 結算報表 -->
    <div id="result-screen" class="hidden">
        <div class="step-indicator">Step 4 / 4：完美結束！</div>
        <h2 style="color: var(--success);">🎉 實戰表現報告</h2>
        <p style="color: #64748b; margin-bottom: 20px;">感謝您參與本次測驗，以下是您使用計算器前後的具體差異：</p>
        <div id="report-container"></div>
    </div>
</div>

<script>
    // ---------------------------------------------------------
    // 🚨 請確認這裡是你最新的 Apps Script 網址 🚨
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwtIqj-ygEZwFg99I5AE1FDOzMfPKabZRjoIEJejcUTC7bZgRxSV4DzFUy59yqYsQ/exec"; 
    // ---------------------------------------------------------

    let rawQuestionsPre = [], groupedQuestionsPre = [];
    let rawQuestionsPost = [], groupedQuestionsPost = [];
    
    let rawQuestions = [];
    let groupedQuestions = []; 
    let currentGroupIdx = 0;
    
    let preTestRecords = [];  
    let postTestRecords = []; 
    let records = [];
    let userInfo = {};
    let currentPhase = '前測';
    
    let questionStartTime = 0;
    let timerInterval;

    function groupifyQuestions(rawArray) {
        let currentGroupName = null;
        let currentGroup = null;
        let result = [];
        rawArray.forEach(q => {
            if (q.group !== currentGroupName) {
                currentGroupName = q.group;
                currentGroup = { groupName: q.group, gText: q.gText, items: [] };
                result.push(currentGroup);
            }
            currentGroup.items.push(q);
        });
        return result;
    }

    window.onload = async () => {
        try {
            const response = await fetch(`${GAS_URL}?action=getQuestions`);
            const data = await response.json();
            
            rawQuestionsPre = data.questionsPre;
            groupedQuestionsPre = groupifyQuestions(rawQuestionsPre);
            
            rawQuestionsPost = data.questionsPost;
            groupedQuestionsPost = groupifyQuestions(rawQuestionsPost);

            document.getElementById('quiz-title').textContent = data.title;
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
        } catch (e) {
            document.getElementById('loading').textContent = "連線失敗，請檢查網路狀態。";
        }
    };

    function toggleSelectOther(selectId, inputId) {
        const sel = document.getElementById(selectId);
        const inp = document.getElementById(inputId);
        if (sel.value === '4') { inp.classList.remove('hidden'); inp.focus(); } else { inp.classList.add('hidden'); inp.value = ''; }
    }
    function toggleCheckboxOther(checkboxId, inputId) {
        const cb = document.getElementById(checkboxId);
        const inp = document.getElementById(inputId);
        if (cb.checked) { inp.classList.remove('hidden'); inp.focus(); } else { inp.classList.add('hidden'); inp.value = ''; }
    }

    function startTestPhase(phase) {
        if (phase === '前測') {
            let uJob = document.getElementById('u-job').value;
            let workplaceVal = document.getElementById('u-workplace').value;
            let uDevice = document.getElementById('u-device').value;

            let refCheckedBoxes = document.querySelectorAll('input[name="u-ref"]:checked');
            let refArray = [];
            let isOtherRefChecked = false;
            let otherRefText = document.getElementById('u-ref-other').value.trim();

            refCheckedBoxes.forEach(cb => {
                if (cb.value === '其他') {
                    isOtherRefChecked = true;
                    if (otherRefText !== "") refArray.push(otherRefText);
                } else { refArray.push(cb.value); }
            });

            let uName = document.getElementById('u-name').value.trim();
            let uYears = document.getElementById('u-years').value.trim();

            if (!uName || !uJob || !uYears || !workplaceVal || !uDevice || refArray.length === 0 || (isOtherRefChecked && !otherRefText)) {
                return alert("請完整填寫基本資料喔！");
            }

            userInfo = { name: uName, job: uJob, years: uYears, workplace: workplaceVal, device: uDevice, ref: refArray.join(', ') };
            document.getElementById('login-screen').classList.add('hidden');
            
            rawQuestions = rawQuestionsPre;
            groupedQuestions = groupedQuestionsPre;
            
        } else if (phase === '後測') {
            document.getElementById('tool-screen').classList.add('hidden');
            rawQuestions = rawQuestionsPost;
            groupedQuestions = groupedQuestionsPost;
        }

        currentPhase = phase;
        currentGroupIdx = 0;
        records = []; 
        document.getElementById('quiz-screen').classList.remove('hidden');
        showGroup();
    }

    function showGroup() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        
        if (currentGroupIdx >= groupedQuestions.length) { 
            finishTestPhase(); 
            return; 
        }

        const stepNum = currentPhase === '前測' ? 'Step 2' : 'Step 4';
        document.getElementById('progress').textContent = `${stepNum} / 4：${currentPhase} - 題組 (${currentGroupIdx + 1} / ${groupedQuestions.length})`;
        
        const groupData = groupedQuestions[currentGroupIdx];
        const container = document.getElementById('group-container');
        
        let html = ``;
        if (groupData.gText) {
            html += `<div class="g-text-box">🗂️ 【病患背景】<br>${groupData.gText}</div>`;
        }
        
        groupData.items.forEach((q, index) => {
            html += `<div class="question-block">
                        <h4> ${index + 1}：${q.text}</h4>`;
            
            const options = q.type === 'tf' ? ['合理', '不合理'] : q.options;
            options.forEach((opt, optIdx) => {
                if (!opt && q.type === 'mc') return;
                html += `<label class="radio-option">
                            <input type="radio" name="q_${q.id}" value="${optIdx}" data-display="${opt}">
                            ${opt}
                         </label>`;
            });
            html += `</div>`;
        });
        
        html += `<button class="btn" onclick="submitGroup()">提交本題組</button>`;
        container.innerHTML = html;

        questionStartTime = Date.now();
        startTimer();
    }

    function startTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const sec = ((Date.now() - questionStartTime) / 1000).toFixed(1);
            document.getElementById('current-timer').textContent = sec;
        }, 100);
    }

    function submitGroup() {
        const groupData = groupedQuestions[currentGroupIdx];
        let groupAnswers = [];
        let allAnswered = true;

        for (let i = 0; i < groupData.items.length; i++) {
            const q = groupData.items[i];
            const selectedOption = document.querySelector(`input[name="q_${q.id}"]:checked`);
            
            if (!selectedOption) {
                allAnswered = false;
                break;
            }
            
            groupAnswers.push({
                id: q.id,
                userAnswer: selectedOption.value,
                answerDisplay: selectedOption.getAttribute('data-display'),
                questionText: q.text,
                type: q.type
            });
        }

        if (!allAnswered) {
            return alert("請確認本題組內的所有子題都已作答！");
        }

        clearInterval(timerInterval);
        const groupTimeSpent = parseFloat(((Date.now() - questionStartTime) / 1000).toFixed(2));

        groupAnswers.forEach(ans => {
            ans.time = groupTimeSpent; 
            records.push(ans);
        });

        currentGroupIdx++;
        showGroup();
    }

    async function finishTestPhase() {
        document.getElementById('quiz-screen').classList.add('hidden');
        
        // 🌟 改變邏輯：前測完先不送資料給後端，而是等到後測全部結束再打包一次送
        if (currentPhase === '前測') {
            preTestRecords = [...records]; 
            document.getElementById('tool-screen').classList.remove('hidden');
        } else {
            postTestRecords = [...records]; 
            document.getElementById('result-screen').classList.remove('hidden');
            
            // 打包成新的 final 格式
            const payload = { 
                action: 'saveFinalResponse', 
                userInfo: userInfo, 
                preTestRecords: preTestRecords,
                postTestRecords: postTestRecords,
                ts: Date.now() 
            };
            
            fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) }).catch(e => console.error(e));
            generateReport(); 
        }
    }

    async function generateReport() {
        const reportContainer = document.getElementById('report-container');
        reportContainer.innerHTML = '<h3 style="color:var(--primary);">正在產生對比報告...</h3>';

        try {
            const res = await fetch(`${GAS_URL}?action=getAnswers`);
            const data = await res.json();
            
            const answersPreMap = data.answersPre;
            const answersPostMap = data.answersPost;

            let preCorrectCount = 0, postCorrectCount = 0;
            let preTotalTime = 0, postTotalTime = 0;

            let tableHTML = `
            <div style="overflow-x: auto;">
                <table class="result-table">
                    <thead>
                        <tr><th>題號</th><th>前測結果</th><th>前測題組耗時</th><th>後測結果</th><th>後測題組耗時</th></tr>
                    </thead>
                    <tbody>
            `;

            for (let g = 0; g < groupedQuestionsPre.length; g++) {
                const groupPre = groupedQuestionsPre[g];
                const groupPost = groupedQuestionsPost[g]; 
                
                const groupItemCount = groupPre.items.length;
                
                const firstQIdPre = groupPre.items[0].id; 
                const firstQIdPost = groupPost ? groupPost.items[0].id : null;

                const preFirst = preTestRecords.find(r => r.id === firstQIdPre);
                const postFirst = postTestRecords.find(r => r.id === firstQIdPost);

                const preGTime = preFirst ? preFirst.time : 0;
                const postGTime = postFirst ? postFirst.time : 0;

                preTotalTime += preGTime;
                postTotalTime += postGTime;

                for (let i = 0; i < groupItemCount; i++) {
                    const qIdPre = groupPre.items[i].id;
                    const qIdPost = groupPost ? groupPost.items[i].id : null;
                    
                    const correctAnsIdxPre = answersPreMap[qIdPre];
                    const correctAnsIdxPost = qIdPost ? answersPostMap[qIdPost] : null;

                    const pre = preTestRecords.find(r => r.id === qIdPre);
                    const preIsCorrect = (pre && Number(pre.userAnswer) === correctAnsIdxPre);
                    if (preIsCorrect) preCorrectCount++;

                    const post = postTestRecords.find(r => r.id === qIdPost);
                    const postIsCorrect = (post && Number(post.userAnswer) === correctAnsIdxPost);
                    if (postIsCorrect) postCorrectCount++;

                    tableHTML += `<tr><td>Q${i+1}</td>`;
                    tableHTML += `<td class="${preIsCorrect ? 'correct' : 'wrong'}">${preIsCorrect ? '✔ 答對' : '✘ 錯誤'}</td>`;
                    
                    if (i === 0) {
                        tableHTML += `<td rowspan="${groupItemCount}" style="vertical-align: middle; font-weight: bold; background: #f8fafc;">${preGTime.toFixed(1)} 秒</td>`;
                    }

                    tableHTML += `<td class="${postIsCorrect ? 'correct' : 'wrong'}">${postIsCorrect ? '✔ 答對' : '✘ 錯誤'}</td>`;

                    if (i === 0) {
                        tableHTML += `<td rowspan="${groupItemCount}" style="vertical-align: middle; font-weight: bold; background: #ecfdf5; color: var(--success);">${postGTime.toFixed(1)} 秒</td>`;
                    }
                    tableHTML += `</tr>`;
                }
            }
            tableHTML += `</tbody></table></div>`;

            const statsHTML = `
            <div class="summary-stats">
                <div class="stat-box"><h4>大腦運算 (前測) 答對</h4><span>${preCorrectCount} / ${rawQuestionsPre.length}</span></div>
                <div class="stat-box"><h4>前測總耗時</h4><span>${preTotalTime.toFixed(1)} 秒</span></div>
            </div>
            <div class="summary-stats" style="background:#ecfdf5; border-color:#a7f3d0;">
                <div class="stat-box"><h4>計算器 (後測) 答對</h4><span style="color:var(--success);">${postCorrectCount} / ${rawQuestionsPost.length}</span></div>
                <div class="stat-box"><h4>後測總耗時</h4><span style="color:var(--success);">${postTotalTime.toFixed(1)} 秒</span></div>
            </div>
            `;

            reportContainer.innerHTML = statsHTML + tableHTML;

        } catch (e) {
            reportContainer.innerHTML = '<p style="color:red; font-weight:bold;">報表載入失敗，但別擔心，您的研究數據已成功上傳！</p>';
        }
    }
</script>

</body>
</html>
